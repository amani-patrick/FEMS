server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"            always;
    add_header X-Content-Type-Options     "nosniff"               always;
    add_header X-XSS-Protection           "1; mode=block"         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:5000;" always;

    # ── SPA routing — all paths fall back to index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── No cache for index.html (so new deploys are picked up) ───────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── Hide nginx version ────────────────────────────────────────────────
    server_tokens off;
}

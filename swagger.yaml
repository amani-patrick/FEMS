openapi: 3.0.0
info:
  title: FEMCS API
  description: Fire Extinguisher Management and Compliance System
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local API Gateway

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, password]
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [admin, technician, inspector, safety_officer] }
      responses:
        '201': { description: User registered }
        '409': { description: Email already registered }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Login successful, returns JWT token }
        '401': { description: Invalid credentials }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        '200': { description: Current user data }

  /auth/users:
    get:
      tags: [Auth]
      summary: List all users (admin only)
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200': { description: List of users }

  /customers:
    get:
      tags: [Customers]
      summary: List customers
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200': { description: List of customers }
    post:
      tags: [Customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, phone]
              properties:
                fullName: { type: string }
                nationalId: { type: string }
                phone: { type: string }
                email: { type: string }
                address: { type: string }
                organizationName: { type: string }
      responses:
        '201': { description: Customer created }

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get customer by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Customer data }
    put:
      tags: [Customers]
      summary: Update customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Customer updated }
    delete:
      tags: [Customers]
      summary: Delete customer (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Customer deleted }

  /extinguishers:
    get:
      tags: [Extinguishers]
      summary: List extinguishers
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, expired, serviced, decommissioned, pending_inspection] }
        - in: query
          name: type
          schema: { type: string, enum: [CO2, Dry Powder, Foam, Water] }
        - in: query
          name: compliance
          schema: { type: string, enum: [compliant, warning, critical, non_compliant] }
      responses:
        '200': { description: List of extinguishers }
    post:
      tags: [Extinguishers]
      summary: Register extinguisher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serialNumber, type, capacityLiters, manufactureDate, purchaseDate, expiryDate, location, customerId]
              properties:
                serialNumber: { type: string }
                type: { type: string, enum: [CO2, Dry Powder, Foam, Water] }
                capacityLiters: { type: number }
                manufactureDate: { type: string, format: date }
                purchaseDate: { type: string, format: date }
                expiryDate: { type: string, format: date }
                location: { type: string }
                customerId: { type: string, format: uuid }
      responses:
        '201': { description: Extinguisher registered }

  /extinguishers/stats:
    get:
      tags: [Extinguishers]
      summary: Inventory statistics
      responses:
        '200': { description: Inventory stats }

  /extinguishers/{id}:
    get:
      tags: [Extinguishers]
      summary: Get extinguisher
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Extinguisher data }
    put:
      tags: [Extinguishers]
      summary: Update extinguisher
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Updated }
    delete:
      tags: [Extinguishers]
      summary: Remove extinguisher (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Removed }

  /inspections:
    get:
      tags: [Inspections]
      summary: List inspections
      responses:
        '200': { description: List of inspections }
    post:
      tags: [Inspections]
      summary: Record inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [extinguisherId, inspectorName, inspectionDate, status]
              properties:
                extinguisherId: { type: string, format: uuid }
                inspectorName: { type: string }
                inspectionDate: { type: string, format: date }
                findings: { type: string }
                status: { type: string, enum: [Passed, Requires Service, Failed] }
                nextInspectionDate: { type: string, format: date }
      responses:
        '201': { description: Inspection recorded }

  /maintenance:
    get:
      tags: [Maintenance]
      summary: List maintenance records
      responses:
        '200': { description: List of maintenance records }
    post:
      tags: [Maintenance]
      summary: Create maintenance record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [extinguisherId, serviceDate, serviceCompany, technicianName]
              properties:
                extinguisherId: { type: string, format: uuid }
                serviceDate: { type: string, format: date }
                serviceCompany: { type: string }
                technicianName: { type: string }
                nextServiceDate: { type: string, format: date }
                cost: { type: number }
                description: { type: string }
                status: { type: string, enum: [scheduled, in_progress, completed, cancelled] }
      responses:
        '201': { description: Maintenance record created }

  /notifications:
    get:
      tags: [Notifications]
      summary: Get notifications for current user
      parameters:
        - in: query
          name: unread
          schema: { type: boolean }
        - in: query
          name: type
          schema: { type: string }
      responses:
        '200': { description: Notifications list with unread count }

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Marked as read }

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200': { description: All marked as read }

  /notifications/escalations:
    get:
      tags: [Notifications]
      summary: List escalations (admin/safety_officer)
      responses:
        '200': { description: Escalations list }

  /notifications/trigger-check:
    post:
      tags: [Notifications]
      summary: Manually trigger expiry check (admin only)
      responses:
        '200': { description: Check triggered }

  /reports/expired:
    get:
      tags: [Reports]
      summary: Expired extinguishers report
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [json, csv] }
      responses:
        '200': { description: Report data }

  /reports/expiring-soon:
    get:
      tags: [Reports]
      summary: Expiring soon report
      parameters:
        - in: query
          name: days
          schema: { type: integer, default: 90 }
        - in: query
          name: format
          schema: { type: string, enum: [json, csv] }
      responses:
        '200': { description: Report data }

  /reports/compliance:
    get:
      tags: [Reports]
      summary: Compliance report
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [json, csv] }
      responses:
        '200': { description: Compliance data }

  /reports/summary:
    get:
      tags: [Reports]
      summary: Dashboard summary statistics
      responses:
        '200': { description: Summary stats }

  /reports/audit:
    get:
      tags: [Reports]
      summary: Audit trail (admin only)
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: action
          schema: { type: string }
      responses:
        '200': { description: Audit logs }

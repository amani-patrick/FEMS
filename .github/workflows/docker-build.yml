name: FEMCS — Build and Push Docker Images

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/femcs

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway:          ${{ steps.filter.outputs.api-gateway }}
      auth-service:         ${{ steps.filter.outputs.auth-service }}
      customer-service:     ${{ steps.filter.outputs.customer-service }}
      extinguisher-service: ${{ steps.filter.outputs.extinguisher-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      report-service:       ${{ steps.filter.outputs.report-service }}
      frontend:             ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
              - 'swagger.yaml'
            auth-service:
              - 'services/auth-service/**'
            customer-service:
              - 'services/entry-service/**'
            extinguisher-service:
              - 'services/extinguisher-service/**'
            notification-service:
              - 'services/notification-service/**'
            report-service:
              - 'services/report-service/**'
            frontend:
              - 'frontend/**'

  # ── Build and push each service ───────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run on push to main/master (not PRs), or manual dispatch
    if: github.event_name != 'pull_request' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false   # one failing service shouldn't cancel others
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
            port: 5000
            changed: ${{ needs.detect-changes.outputs.api-gateway }}

          - service: auth-service
            context: ./services/auth-service
            port: 5001
            changed: ${{ needs.detect-changes.outputs.auth-service }}

          - service: customer-service
            context: ./services/entry-service
            port: 5002
            changed: ${{ needs.detect-changes.outputs.customer-service }}

          - service: extinguisher-service
            context: ./services/extinguisher-service
            port: 5003
            changed: ${{ needs.detect-changes.outputs.extinguisher-service }}

          - service: notification-service
            context: ./services/notification-service
            port: 5004
            changed: ${{ needs.detect-changes.outputs.notification-service }}

          - service: report-service
            context: ./services/report-service
            port: 5005
            changed: ${{ needs.detect-changes.outputs.report-service }}

          - service: frontend
            context: ./frontend
            port: 3000
            changed: ${{ needs.detect-changes.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            SERVICE_PORT=${{ matrix.port }}

  # ── PR validation — build only, no push ───────────────────────────────────
  build-pr:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'pull_request'

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: auth-service
            context: ./services/auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - service: customer-service
            context: ./services/entry-service
            changed: ${{ needs.detect-changes.outputs.customer-service }}
          - service: extinguisher-service
            context: ./services/extinguisher-service
            changed: ${{ needs.detect-changes.outputs.extinguisher-service }}
          - service: notification-service
            context: ./services/notification-service
            changed: ${{ needs.detect-changes.outputs.notification-service }}
          - service: report-service
            context: ./services/report-service
            changed: ${{ needs.detect-changes.outputs.report-service }}
          - service: frontend
            context: ./frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} (PR check — no push)
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          tags: femcs-${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Skip (no changes in ${{ matrix.service }})
        if: matrix.changed != 'true'
        run: echo "No changes detected in ${{ matrix.service }} — skipping build."
